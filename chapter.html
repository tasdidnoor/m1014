<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Questions</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .button-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            max-width: 1200px; 
            margin-bottom: 40px;
        }
        .question-btn { 
            padding: 10px 20px; 
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
        }
        .resources-section { margin-top: 50px; }
        .resource-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .resource-box { 
            border: 1px solid #ccc; 
            padding: 10px; 
            width: calc(33.33% - 14px); 
            text-align: center;
            box-sizing: border-box;
        }

        /* Responsive Adjustments */
        @media (max-width: 1024px) {
            .resource-box { width: calc(50% - 10px); }
        }
        @media (max-width: 600px) {
            .question-btn { width: 100%; }
            .resource-box { width: 100%; }
        }

        .thumbnail { 
            width: 100%; 
            height: 150px; 
            background-color: #eee; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin-bottom: 10px;
        }
        .back-nav { margin-bottom: 20px; }
        footer { 
            margin-top: 100px; 
            border-top: 1px solid #000; 
            padding-top: 20px; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <button onclick="window.location.href='index.html'"> < Back to Chapters </button>
    </div>

    <h1 id="chapterTitle">Chapter Questions</h1>

    <div class="button-grid" id="questionGrid">
        <!-- Dynamic content from script.js -->
    </div>

    <footer>
        <p>Copyright &copy; 2026 Created by Tasdid Noor</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
