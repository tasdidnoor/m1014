<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Questions</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .button-grid { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            max-width: 1200px; 
            margin-bottom: 40px;
        }
        .question-btn { 
            width: calc(10% - 10px); 
            padding: 10px; 
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
        }
        .resources-section { margin-top: 50px; }
        .resource-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .resource-box { 
            border: 1px solid #ccc; 
            padding: 10px; 
            width: calc(33.33% - 14px); 
            text-align: center;
            box-sizing: border-box;
        }

        /* Responsive Adjustments */
        @media (max-width: 1024px) {
            .question-btn { width: calc(20% - 10px); }
            .resource-box { width: calc(50% - 10px); }
        }
        @media (max-width: 600px) {
            .question-btn { width: calc(33.33% - 10px); }
            .resource-box { width: 100%; }
        }

        .thumbnail { 
            width: 100%; 
            height: 150px; 
            background-color: #eee; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            margin-bottom: 10px;
        }
        .back-nav { margin-bottom: 20px; }
        footer { 
            margin-top: 100px; 
            border-top: 1px solid #000; 
            padding-top: 20px; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="back-nav">
        <button onclick="window.location.href='index.html'"> < Back to Chapters </button>
    </div>

    <h1 id="chapterTitle">Chapter Questions</h1>

    <div class="button-grid" id="questionGrid">
        <!-- Dynamic content from script.js -->
    </div>

    <h1 class="resources-section" id="resources">Additional Resources</h1>
    <div class="resource-grid">
        <div class="resource-box">
            <div class="thumbnail">Thumbnail Placeholder 1</div>
            <a href="#">Chapter Deep Dive Video</a>
        </div>
        <div class="resource-box">
            <div class="thumbnail">Thumbnail Placeholder 2</div>
            <a href="#">Solved Examples PDF</a>
        </div>
        <div class="resource-box">
            <div class="thumbnail">Thumbnail Placeholder 3</div>
            <a href="#">Interactive Quiz</a>
        </div>
    </div>

    <footer>
        <p>Copyright &copy; 2026 Created by Mr. Happy | Email: contact@mrhappy.com</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
